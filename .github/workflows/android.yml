name: Build ViPhooN APK

# Собирает APK ViPhooN:
#  1) собирает libbox.aar / libbox-legacy.aar из исходников sing-box (gomobile + NDK)
#  2) кладёт их в app/libs
#  3) ассемблит debug-APK (самоподписанный, ставится сайдлоадом)
#
# Готовый APK — во вкладке Actions -> запуск -> Artifacts -> viphoon-apk.
#
# sing_box_ref подбирается под версию SFA (см. version.properties). Если сборка
# libbox падает на несовместимости API — поменяй sing_box_ref на соседний тег/коммит.

on:
  push:
    branches: [main, master, dev]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      sing_box_ref:
        description: "git ref (tag/branch/commit) репозитория SagerNet/sing-box для сборки libbox"
        required: true
        default: "dev-next"
      mihomo_version:
        description: "версия mihomo (xhttp-мост), напр. v1.19.28"
        required: false
        default: "v1.19.28"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SING_BOX_REF: ${{ github.event.inputs.sing_box_ref || 'dev-next' }}
      MIHOMO_VERSION: ${{ github.event.inputs.mihomo_version || 'v1.19.28' }}
    steps:
      - name: Checkout ViPhooN (с сабмодулями)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Прочитать GO_VERSION из version.properties
        id: props
        run: |
          go_version="$(grep '^GO_VERSION=' version.properties | cut -d= -f2 | sed 's/^go//')"
          echo "go_version=${go_version:-1.25.11}" >> "$GITHUB_OUTPUT"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.props.outputs.go_version }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Установить NDK
        run: |
          set -e
          sdkmanager "ndk;28.0.13004108"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"

      - name: Клонировать sing-box (${{ env.SING_BOX_REF }})
        run: git clone --depth 1 --branch "$SING_BOX_REF" https://github.com/SagerNet/sing-box.git sing-box-src || git clone https://github.com/SagerNet/sing-box.git sing-box-src

      - name: Собрать libbox.aar (gomobile)
        working-directory: sing-box-src
        run: |
          set -e
          if [ -n "$SING_BOX_REF" ]; then git checkout "$SING_BOX_REF" || true; fi
          # Установить gomobile/gobind (форк sagernet, как в Makefile sing-box)
          make lib_install || {
            go install -v github.com/sagernet/gomobile/cmd/gomobile@latest
            go install -v github.com/sagernet/gomobile/cmd/gobind@latest
          }
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          export PATH="$(go env GOPATH)/bin:$PATH"
          make lib_android

      - name: Разложить AAR в app/libs
        run: |
          set -e
          mkdir -p app/libs
          find sing-box-src -maxdepth 2 -name 'libbox*.aar' -exec cp -v {} app/libs/ \;
          ls -lh app/libs/

      - name: Скачать mihomo (xhttp-мост) в jniLibs
        env:
          MIHOMO_VERSION: ${{ env.MIHOMO_VERSION }}
        run: |
          set -e
          # mihomo поднимает xhttp/splithttp-ноды, которые sing-box не умеет.
          # Бинарь кладём как «нативную библиотеку» libmihomo.so — только из
          # nativeLibraryDir Android 10+ разрешает запуск исполняемых файлов.
          ver="${MIHOMO_VERSION:-v1.19.28}"
          base="https://github.com/MetaCubeX/mihomo/releases/download/${ver}"
          # abi:asset
          for pair in \
            "arm64-v8a:mihomo-android-arm64-v8" \
            "armeabi-v7a:mihomo-android-armv7" \
            "x86:mihomo-android-386" \
            "x86_64:mihomo-android-amd64"; do
            abi="${pair%%:*}"; asset="${pair##*:}"
            dst="app/src/main/jniLibs/${abi}"
            mkdir -p "$dst"
            echo "==> ${asset}-${ver}.gz -> ${dst}/libmihomo.so"
            curl -fsSL "${base}/${asset}-${ver}.gz" -o /tmp/mihomo.gz
            gunzip -c /tmp/mihomo.gz > "${dst}/libmihomo.so"
            chmod +x "${dst}/libmihomo.so"
          done
          ls -lhR app/src/main/jniLibs/

      # Постоянная подпись: без неё каждая сборка подписывается новым
      # debug-ключом раннера и APK не встаёт обновлением поверх старого.
      # Секреты: RELEASE_KEYSTORE_B64 (base64 keystore) и LOCAL_PROPERTIES
      # (base64 от файла с KEYSTORE_PASS/ALIAS_NAME/ALIAS_PASS).
      - name: Восстановить release.keystore из секрета
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_B64" ]; then
            echo "$RELEASE_KEYSTORE_B64" | base64 -d > app/release.keystore
            echo "keystore восстановлен"
          else
            echo "секрет RELEASE_KEYSTORE_B64 не задан — подпись debug-ключом раннера (обновления поверх не встанут)"
          fi

      - name: Сборка APK (otherDebug, universal)
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleOtherDebug --no-daemon --stacktrace

      - name: Собрать APK в один каталог
        run: |
          mkdir -p out
          find app/build/outputs/apk -name '*.apk' -exec cp -v {} out/ \;
          ls -lh out/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: viphoon-apk
          path: out/*.apk
          if-no-files-found: error

      # ── Релиз по тегу v* ──────────────────────────────────────────────
      # Встроенный апдейтер приложения смотрит releases этого репозитория и
      # требует ассет ViPhooN-version-metadata.json (version_code/version_name).
      - name: Сгенерировать метаданные версии
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          vc="$(grep '^VERSION_CODE=' version.properties | cut -d= -f2 | tr -d '[:space:]')"
          vn="$(grep '^VERSION_NAME=' version.properties | cut -d= -f2 | tr -d '[:space:]')"
          printf '{"version_code": %s, "version_name": "%s"}\n' "$vc" "$vn" > out/ViPhooN-version-metadata.json
          cat out/ViPhooN-version-metadata.json

      - name: Опубликовать GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.apk
            out/ViPhooN-version-metadata.json
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
